<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expenses | Sales Manager Pro</title>
    <style>
        :root { --bg: #f0f2f5; --card: #ffffff; --primary: #4f46e5; --success: #10b981; --danger: #ef4444; --text: #1e293b; --text-light: #64748b; --border: #e2e8f0; --shadow: 0 2px 12px rgba(0,0,0,0.04); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
        body { background: var(--bg); min-height: 100vh; padding: 20px; }
        .container { max-width: 700px; margin: 0 auto; }
        .topbar { margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .topbar h1 { font-size: 22px; color: var(--text); } .topbar a { text-decoration: none; color: var(--primary); font-weight: 600; font-size: 14px; }
        .card { background: var(--card); border-radius: 16px; padding: 22px; margin-bottom: 18px; box-shadow: var(--shadow); }
        .card h3 { color: var(--text); font-size: 17px; margin-bottom: 16px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 10px; align-items: end; }
        .form-group { margin-bottom: 8px; }
        .form-group label { display: block; font-weight: 600; color: var(--text); margin-bottom: 5px; font-size: 11px; text-transform: uppercase; }
        .form-group input, .form-group select { width: 100%; padding: 11px; border: 2px solid var(--border); border-radius: 8px; font-size: 14px; background: var(--card); }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: var(--danger); }
        .summary-card { background: linear-gradient(135deg, #ef4444, #dc2626); color: white; padding: 16px 20px; border-radius: 12px; text-align: center; margin-bottom: 15px; }
        .summary-card .amount { font-size: 28px; font-weight: 700; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        table th { background: var(--danger); color: white; padding: 10px 8px; text-align: left; font-size: 10px; text-transform: uppercase; }
        table td { padding: 8px; border-bottom: 1px solid var(--border); color: var(--text); }
        .btn { padding: 10px 16px; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; color: white; transition: all 0.2s; }
        .btn-danger { background: var(--danger); } .btn-success { background: var(--success); }
        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #0f172a; color: white; padding: 14px 28px; border-radius: 50px; font-size: 14px; z-index: 1000; display: none; animation: slideDown 0.3s; }
        @keyframes slideDown { from { transform: translateX(-50%) translateY(-80px); opacity: 0; } to { transform: translateX(-50%) translateY(0); opacity: 1; } }
        @media (max-width: 600px) { .form-row { grid-template-columns: 1fr 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="topbar"><h1>💸 Record Expense</h1><a href="dashboard.html">🔙 Dashboard</a></div>
        <div class="card">
            <h3>➕ Add New Expense</h3>
            <div class="form-row">
                <div class="form-group"><label>Description</label><input type="text" id="expenseDesc" placeholder="e.g., Diesel"></div>
                <div class="form-group"><label>Category</label><select id="expenseCat"><option value="Fuel">Fuel</option><option value="Maintenance">Maintenance</option><option value="Electricity">Electricity</option><option value="Water">Water</option><option value="Transport">Transport</option><option value="Other">Other</option></select></div>
                <div class="form-group"><label>Amount (GHS)</label><input type="number" id="expenseAmount" placeholder="0.00" step="0.01"></div>
                <button class="btn btn-danger" onclick="addExpense()" style="height:42px;">💸 Add</button>
            </div>
        </div>
        <div class="summary-card"><div style="font-size:11px;opacity:0.85;">TOTAL THIS MONTH</div><div class="amount" id="monthTotal">GHS 0.00</div></div>
        <div class="card">
            <h3>📋 Expense History</h3>
            <div style="overflow-x:auto;">
                <table><thead><tr><th>Date</th><th>Description</th><th>Category</th><th>Amount</th><th>Action</th></tr></thead>
                    <tbody id="expensesTable"><tr><td colspan="5" style="text-align:center;color:#999;">Loading...</td></tr></tbody>
                </table>
            </div>
        </div>
    </div>
    <div class="toast" id="toast"></div>

    <script>
        var expenses = [];
        window.onload = function() { loadExpenses(); };

        function loadExpenses() {
            expenses = JSON.parse(localStorage.getItem('milling_expenses')) || [];
            expenses.sort(function(a,b){ return new Date(b.Date||b.date) - new Date(a.Date||a.date); });
            var monthStart = new Date(new Date().getFullYear(), new Date().getMonth(), 1).toLocaleDateString();
            var monthTotal = expenses.filter(function(e){ return new Date(e.Date||e.date) >= new Date(monthStart); }).reduce(function(s,e){ return s + (parseFloat(e.Amount||e.amount)||0); }, 0);
            document.getElementById('monthTotal').textContent = 'GHS ' + monthTotal.toLocaleString();
            var tbody = document.getElementById('expensesTable'), html = '';
            expenses.slice(0,20).forEach(function(e,i){ html += '<tr><td>' + (e.Date||e.date) + '</td><td>' + (e.Description||e.description) + '</td><td>' + (e.Category||e.category) + '</td><td><strong>GHS ' + parseFloat(e.Amount||e.amount||0).toFixed(2) + '</strong></td><td><button class="btn btn-danger" style="padding:4px 8px;font-size:10px;" onclick="deleteExpense(' + i + ')">🗑</button></td></tr>'; });
            tbody.innerHTML = html || '<tr><td colspan="5" style="text-align:center;color:#999;">No expenses</td></tr>';
        }

        function addExpense() {
            var desc = document.getElementById('expenseDesc').value.trim(), cat = document.getElementById('expenseCat').value, amt = parseFloat(document.getElementById('expenseAmount').value) || 0;
            if (!desc || !amt) { showToast('Fill all fields!'); return; }
            expenses.push({ Date: new Date().toLocaleDateString(), date: new Date().toLocaleDateString(), Description: desc, description: desc, Category: cat, category: cat, Amount: amt, amount: amt });
            localStorage.setItem('milling_expenses', JSON.stringify(expenses));
            document.getElementById('expenseDesc').value = ''; document.getElementById('expenseAmount').value = '';
            loadExpenses(); showToast('Expense recorded! 💸');
        }

        function deleteExpense(i) { if (confirm('Delete?')) { expenses.splice(i, 1); localStorage.setItem('milling_expenses', JSON.stringify(expenses)); loadExpenses(); showToast('Deleted.'); } }
        function showToast(msg) { var t = document.getElementById('toast'); t.textContent = msg; t.style.display = 'block'; setTimeout(function() { t.style.display = 'none'; }, 2500); }
    </script>
</body>
</html>
