<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Machinery Services Pro | Login</title>
    <style>
        :root { --bg: #0f1923; --card: #1a2736; --accent: #00c9a7; --accent-hover: #00b894; --text: #e0e0e0; --text-light: #8899aa; --input-bg: #243447; --border: #2d4a5e; --danger: #e74c3c; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
        body { background: var(--bg); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .login-wrapper { display: flex; max-width: 900px; width: 100%; border-radius: 20px; overflow: hidden; box-shadow: 0 30px 80px rgba(0,0,0,0.5); }
        .login-left { background: linear-gradient(135deg, #00c9a7 0%, #009d82 100%); flex: 1; padding: 50px 40px; display: flex; flex-direction: column; justify-content: center; color: white; }
        .login-left .brand-icon { font-size: 56px; margin-bottom: 20px; }
        .login-left h1 { font-size: 32px; font-weight: 700; margin-bottom: 10px; }
        .login-left p { font-size: 15px; opacity: 0.9; line-height: 1.6; }
        .login-left .features { margin-top: 30px; list-style: none; }
        .login-left .features li { padding: 8px 0; font-size: 14px; }
        .login-left .features li::before { content: '✓ '; font-weight: bold; }
        .login-right { background: var(--card); flex: 1; padding: 50px 40px; display: flex; flex-direction: column; justify-content: center; }
        .login-right h2 { color: white; font-size: 24px; margin-bottom: 8px; }
        .login-right .subtitle { color: var(--text-light); font-size: 13px; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; color: #aabbcc; font-size: 12px; font-weight: 600; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        .form-group input, .form-group select { width: 100%; padding: 14px 16px; background: var(--input-bg); border: 2px solid var(--border); border-radius: 10px; color: white; font-size: 15px; }
        .form-group select option { background: #1a2736; color: white; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,201,167,0.1); }
        .form-group input::placeholder { color: #5a7a8a; }
        .btn-login { width: 100%; padding: 15px; background: var(--accent); color: #0f1923; border: none; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.3s; margin-top: 10px; }
        .btn-login:hover { background: var(--accent-hover); transform: translateY(-3px); box-shadow: 0 10px 30px rgba(0,201,167,0.3); }
        .footer-text { text-align: center; color: #5a7a8a; font-size: 11px; margin-top: 30px; }
        .footer-text a { color: var(--accent); text-decoration: none; }
        @media (max-width: 700px) { .login-wrapper { flex-direction: column; max-width: 400px; } .login-left { padding: 30px 25px; text-align: center; } .login-right { padding: 30px 25px; } }
    </style>
</head>
<body>

    <div class="login-wrapper">
        <!-- Left Brand Panel -->
        <div class="login-left">
            <div class="brand-icon">🏭</div>
            <h1>Machinery Services Pro</h1>
            <p>The complete management system for milling and machinery services.</p>
            <ul class="features">
                <li>Track all transactions</li>
                <li>Worker attendance & payment</li>
                <li>Bread flour tracking</li>
                <li>Profit reports</li>
            </ul>
        </div>
        
        <!-- Right Login Form -->
        <div class="login-right">
            <h2>Welcome Back</h2>
            <p class="subtitle">Sign in to your account</p>
            
            <div class="form-group">
                <label>Username</label>
                <select id="userSelect">
                    <option value="">-- Select Your Name --</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="passwordInput" placeholder="Enter your password">
            </div>
            
            <button class="btn-login" onclick="doLogin()">🚀 Sign In</button>
            
            <p class="footer-text">
                © 2025 iTech Systems Solutions | <a href="admin.html">⚙️ Admin Panel</a>
            </p>
        </div>
    </div>

    <script>
        // Load users from localStorage
        function loadUsers() {
            var select = document.getElementById('userSelect');
            var users = JSON.parse(localStorage.getItem('milling_users')) || [];
            
            if (users.length === 0) {
                users = [
                    { name: 'Administrator', password: '1234' },
                    { name: 'Owner', password: '1234' }
                ];
                localStorage.setItem('milling_users', JSON.stringify(users));
            }
            
            select.innerHTML = '<option value="">-- Select Your Name --</option>';
            for (var i = 0; i < users.length; i++) {
                select.innerHTML += '<option value="' + users[i].name + '">' + users[i].name + '</option>';
            }
        }

        // Login function
        function doLogin() {
            var userSelect = document.getElementById('userSelect');
            var passInput = document.getElementById('passwordInput');
            var user = userSelect.value;
            var pass = passInput.value;
            
            if (!user || user === '') {
                alert('Please select your name!');
                return;
            }
            
            if (!pass || pass === '') {
                alert('Please enter your password!');
                return;
            }
            
            var users = JSON.parse(localStorage.getItem('milling_users')) || [];
            var foundUser = null;
            
            for (var i = 0; i < users.length; i++) {
                if (users[i].name === user) {
                    foundUser = users[i];
                    break;
                }
            }
            
            var correctPassword = foundUser ? (foundUser.password || '1234') : '1234';
            
            if (pass !== correctPassword) {
                alert('❌ Invalid password! Please try again.\n\nDefault password is: 1234');
                return;
            }
            
            // Login successful
            localStorage.setItem('salesUser', user);
            
            if (user === 'Owner') {
                window.location.href = 'owner_view.html';
            } else {
                window.location.href = 'dashboard.html';
            }
        }

        // Load users when page opens
        window.onload = function() { loadUsers(); };

        // Allow Enter key to login
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') doLogin();
        });
    </script>
</body>
</html>
